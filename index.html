let pasoActual = 0;
let respuestas = {};
let pasoMaximoAlcanzado = 0;

// 🔥 CARGAR RESPUESTAS GUARDADAS
const datosGuardados = localStorage.getItem("respuestasFormulario");

if (datosGuardados) {
    try {
        respuestas = JSON.parse(datosGuardados);
    } catch (e) {
        console.error("Error al parsear respuestas guardadas", e);
        respuestas = {};
    }
}


function onTipoClienteChange() {

    const select = document.getElementById("tipoCliente");
    const tipo = select.value;

    // 🔥 GUARDAR
    localStorage.setItem("tipoCliente", tipo);

    // 🔥 RESET
    pasoActual = 0;
    pasoMaximoAlcanzado = 0;

    // 🔥 GENERAR
    generarFormulario();
}



function generarFormulario() {

    const tipo = document.getElementById("tipoCliente").value;
    const contenedor = document.getElementById("formulario");
    contenedor.innerHTML = "";

    if (!tipo) return;

    const pasos = modelos[tipo];
    const sec = pasos[pasoActual];
    const i = pasoActual;

    const divSec = document.createElement("div");
    divSec.className = "seccion";

    const titulo = document.createElement("h3");
    titulo.innerText = sec.seccion;
    divSec.appendChild(titulo);

    sec.preguntas.forEach((p, j) => {

        const divPregunta = document.createElement("div");
        divPregunta.className = "pregunta";

        const label = document.createElement("label");
        label.innerText = p.label;
        divPregunta.appendChild(label);

        let input = null;

        // 🔹 TEXTO / NUMERO
        if (p.tipo === "texto" || p.tipo === "numero") {
            input = document.createElement("input");
            input.type = p.tipo === "numero" ? "number" : "text";
            input.name = `${i}_${j}`;
            input.placeholder = p.label;

            if (respuestas[input.name]) {
                input.value = respuestas[input.name];
            }

            input.addEventListener("input", () => {
                respuestas[input.name] = input.value;
                localStorage.setItem("respuestasFormulario", JSON.stringify(respuestas));
            });
        }

        // 🔹 TEXTAREA (CON PLACEHOLDER PRO)
        if (p.tipo === "textarea") {
            input = document.createElement("textarea");
            input.name = `${i}_${j}`;
            input.placeholder = p.label;

            if (respuestas[input.name]) {
                input.value = respuestas[input.name];
            }

            input.addEventListener("focus", () => {
                input.placeholder = "";
            });

            input.addEventListener("input", () => {
                respuestas[input.name] = input.value;
                localStorage.setItem("respuestasFormulario", JSON.stringify(respuestas));
            });
        }

        // 🔹 RADIO + DEPENDIENTES
        if (p.tipo === "radio") {
            input = document.createElement("div");
            input.className = "opciones";

            p.opciones.forEach(op => {

                const opcion = document.createElement("label");

                const radio = document.createElement("input");
                radio.type = "radio";
                radio.name = `${i}_${j}`;
                radio.value = op;

                const seleccionado = respuestas[radio.name] === op;

                if (seleccionado) {
                    radio.checked = true;
                }

                const renderDependientes = () => {

                    const existente = divPregunta.querySelector(".dependiente");
                    if (existente) existente.remove();

                    if (p.dependientes) {
                        p.dependientes.forEach(dep => {

                            if (dep.valor === op) {

                                const contDep = document.createElement("div");
                                contDep.className = "dependiente";
                                contDep.style.marginTop = "10px";

                                dep.preguntas.forEach((dp, k) => {

                                    const lbl = document.createElement("label");
                                    lbl.innerText = dp.label;

                                    const txt = document.createElement("textarea");
                                    txt.name = `${i}_${j}_dep_${k}`;
                                    txt.placeholder = dp.label;

                                    if (respuestas[txt.name]) {
                                        txt.value = respuestas[txt.name];
                                    }

                                    txt.addEventListener("focus", () => {
                                        txt.placeholder = "";
                                    });

                                    txt.addEventListener("input", () => {
                                        respuestas[txt.name] = txt.value;
                                        localStorage.setItem("respuestasFormulario", JSON.stringify(respuestas));
                                    });

                                    contDep.appendChild(lbl);
                                    contDep.appendChild(txt);
                                });

                                divPregunta.appendChild(contDep);
                            }

                        });
                    }
                };

                radio.addEventListener("change", () => {
                    respuestas[radio.name] = op;
                    localStorage.setItem("respuestasFormulario", JSON.stringify(respuestas));
                    renderDependientes();
                });

                if (seleccionado) {
                    renderDependientes();
                }

                const texto = document.createElement("span");
                texto.innerText = op;

                opcion.appendChild(radio);
                opcion.appendChild(texto);

                input.appendChild(opcion);
            });
        }

        // 🔹 SELECT
        if (p.tipo === "select") {
            input = document.createElement("select");
            input.name = `${i}_${j}`;

            p.opciones.forEach(op => {
                const opt = document.createElement("option");
                opt.value = op;
                opt.innerText = op;
                input.appendChild(opt);
            });

            if (respuestas[input.name]) {
                input.value = respuestas[input.name];
            }

            input.addEventListener("change", () => {
                respuestas[input.name] = input.value;
                localStorage.setItem("respuestasFormulario", JSON.stringify(respuestas));
            });
        }

        // 🔥 CHECKBOX + DEPENDIENTE "OTROS"
        if (p.tipo === "checkbox") {
            input = document.createElement("div");
            input.className = "opciones";

            p.opciones.forEach(op => {

                const opcion = document.createElement("label");

                const check = document.createElement("input");
                check.type = "checkbox";
                check.name = `${i}_${j}`;
                check.value = op;

                if (respuestas[check.name] && respuestas[check.name].includes(op)) {
                    check.checked = true;
                }

                const renderDependienteOtros = () => {

                    const existente = divPregunta.querySelector(".dependiente-otros");
                    if (existente) existente.remove();

                    if (op === "Otros" && check.checked) {

                        const cont = document.createElement("div");
                        cont.className = "dependiente-otros";
                        cont.style.marginTop = "10px";

                        const txt = document.createElement("textarea");
                        txt.name = `${i}_${j}_otros`;
                        txt.placeholder = "Describa";

                        if (respuestas[txt.name]) {
                            txt.value = respuestas[txt.name];
                        }

                        txt.addEventListener("focus", () => {
                            txt.placeholder = "";
                        });

                        txt.addEventListener("input", () => {
                            respuestas[txt.name] = txt.value;
                            localStorage.setItem("respuestasFormulario", JSON.stringify(respuestas));
                        });

                        cont.appendChild(txt);
                        divPregunta.appendChild(cont);
                    }
                };

                check.addEventListener("change", () => {

                    if (!respuestas[check.name]) {
                        respuestas[check.name] = [];
                    }

                    if (check.checked) {
                        if (!respuestas[check.name].includes(check.value)) {
                            respuestas[check.name].push(check.value);
                        }
                    } else {
                        respuestas[check.name] = respuestas[check.name].filter(v => v !== check.value);
                    }

                    localStorage.setItem("respuestasFormulario", JSON.stringify(respuestas));

                    renderDependienteOtros();
                });

                if (check.checked) {
                    renderDependienteOtros();
                }

                const texto = document.createElement("span");
                texto.innerText = op;

                opcion.appendChild(check);
                opcion.appendChild(texto);

                input.appendChild(opcion);
            });
        }

        if (input) {
            divPregunta.appendChild(input);
            divSec.appendChild(divPregunta);
        }

    });

    contenedor.appendChild(divSec);

    const tipoActual = document.getElementById("tipoCliente").value;

    const btnAnterior = document.querySelector("#navegacion button:nth-child(1)");
    const btnSiguiente = document.querySelector("#navegacion button:nth-child(2)");
    const btnFinalizar = document.querySelector("button[onclick='generarResumen()']");

    btnAnterior.style.display = pasoActual === 0 ? "none" : "inline-block";

    if (pasoActual === modelos[tipoActual].length - 1) {
        btnSiguiente.style.display = "none";
        btnFinalizar.style.display = "inline-block";
    } else {
        btnSiguiente.style.display = "inline-block";
        btnFinalizar.style.display = "none";
    }

    if (pasoActual > pasoMaximoAlcanzado) {
        pasoMaximoAlcanzado = pasoActual;
    }

    const progreso = ((pasoMaximoAlcanzado + 1) / modelos[tipoActual].length) * 100;

    const barra = document.getElementById("progresoFill");
    barra.style.width = progreso + "%";
    barra.innerText = Math.round(progreso) + "%";
}




function generarResumen() {

    let texto = "📋 PERFIL DEL CLIENTE\n\n";

    const secciones = document.querySelectorAll("#formulario .seccion");

    secciones.forEach(sec => {

        const titulo = sec.querySelector("h3").innerText;

        texto += "━━━━━━━━━━━━━━━━━━━━\n";
        texto += "🔹 " + titulo.toUpperCase() + "\n\n";

        const preguntas = sec.querySelectorAll(".pregunta");

        preguntas.forEach(p => {

            const label = p.querySelector("label").innerText;
            let valor = "";

            const inputTexto = p.querySelector("input[type='text'], input[type='number'], textarea");
            const select = p.querySelector("select");
            const radios = p.querySelectorAll("input[type='radio']");
            const checks = p.querySelectorAll("input[type='checkbox']");

            if (inputTexto && !p.querySelector(".dependiente textarea")) {
                valor = inputTexto.value;
            }

            if (select) {
                valor = select.value;
            }

            if (radios.length > 0) {
                radios.forEach(r => {
                    if (r.checked) valor = r.value;
                });
            }

            if (checks.length > 0) {
                let seleccionados = [];
                checks.forEach(c => {
                    if (c.checked) seleccionados.push(c.value);
                });
                valor = seleccionados.join(", ");
            }

            texto += "• " + label + ":\n";
            texto += "  " + (valor || "-") + "\n";

            // 🔥 DEPENDIENTES
            const dependiente = p.querySelector(".dependiente");
            if (dependiente) {

                const labelsDep = dependiente.querySelectorAll("label");
                const inputsDep = dependiente.querySelectorAll("textarea, input");

                labelsDep.forEach((lbl, index) => {

                    const val = inputsDep[index]?.value || "-";

                    texto += "    ↳ " + lbl.innerText + ":\n";
                    texto += "      " + val + "\n";

                });
            }

            // 🔥 DEPENDIENTE "OTROS"
            const otros = p.querySelector(".dependiente-otros");
            if (otros) {

                const txt = otros.querySelector("textarea");
                const val = txt?.value || "-";

                texto += "    ↳ Otros:\n";
                texto += "      " + val + "\n";
            }

            texto += "\n";

        });

    });

    texto += "━━━━━━━━━━━━━━━━━━━━\n";
    texto += "📌 Fin del cuestionario\n";

    document.getElementById("resultado").innerText = texto;
}



function siguientePaso() {

    guardarRespuestas();

    const tipo = document.getElementById("tipoCliente").value;

    // 🔥 ASEGURAR GUARDADO DE TIPO CLIENTE
    localStorage.setItem("tipoCliente", tipo);

    if (!tipo) return;

    const contenedor = document.getElementById("formulario");

    // 🔥 VALIDACIÓN
    const preguntas = contenedor.querySelectorAll(".pregunta");

    for (let p of preguntas) {

        const inputTexto = p.querySelector("input[type='text'], input[type='number'], textarea");
        const select = p.querySelector("select");
        const radios = p.querySelectorAll("input[type='radio']");
        const checks = p.querySelectorAll("input[type='checkbox']");

        let valido = false;

        if (inputTexto && inputTexto.value.trim() !== "") {
            valido = true;
        }

        if (select && select.value !== "") {
            valido = true;
        }

        if (radios.length > 0) {
            radios.forEach(r => {
                if (r.checked) valido = true;
            });
        }

        if (checks.length > 0) {
            checks.forEach(c => {
                if (c.checked) valido = true;
            });
        }

        if (!valido) {
            alert("Por favor completá todos los campos antes de continuar");
            return;
        }
    }

    if (pasoActual < modelos[tipo].length - 1) {
        pasoActual++;
        generarFormulario();
    }
}



function anteriorPaso() {
    guardarRespuestas();

    if (pasoActual > 0) {
        pasoActual--;
        generarFormulario();
    }
}



function guardarRespuestas() {

    console.log("💾 guardarRespuestas ejecutado");

    const inputs = document.querySelectorAll("#formulario input, #formulario textarea, #formulario select");

    inputs.forEach(input => {

        if (input.type === "radio") {
            if (input.checked) {
                respuestas[input.name] = input.value;
            }
        }

        else if (input.type === "checkbox") {

            if (!respuestas[input.name]) {
                respuestas[input.name] = [];
            }

            if (input.checked) {
                if (!respuestas[input.name].includes(input.value)) {
                    respuestas[input.name].push(input.value);
                }
            } else {
                respuestas[input.name] = respuestas[input.name].filter(v => v !== input.value);
            }
        }

        else {
            respuestas[input.name] = input.value;
        }

    });

    console.log("🧠 respuestas antes de guardar:", respuestas);

    localStorage.setItem("respuestasFormulario", JSON.stringify(respuestas));
    localStorage.setItem("tipoCliente", document.getElementById("tipoCliente").value);
    localStorage.setItem("pasoActual", pasoActual);

    console.log("✅ guardado en localStorage");
}


    

function copiarTexto() {
    const texto = document.getElementById("resultado").innerText;

    navigator.clipboard.writeText(texto).then(() => {
        alert("Respuestas copiadas al portapapeles");
    }).catch(err => {
        alert("Error al copiar");
    });
}




function enviarWhatsApp() {

    const texto = document.getElementById("resultado").innerText;

    if (!texto || texto.trim() === "") {
        alert("Primero generá las respuestas");
        return;
    }

    const mensaje = encodeURIComponent(texto);

    // 🔥 TU NÚMERO DIRECTO (Argentina)
    const numero = "5491158648857";

    const url = `https://wa.me/${numero}?text=${mensaje}`;

    window.open(url, "_blank");
}


function limpiarFormulario() {
    localStorage.removeItem("respuestasFormulario");
    respuestas = {};
    pasoActual = 0;
    generarFormulario();
}


// 🔥 AUTO INICIAR SI HAY DATOS GUARDADOS
window.onload = () => {

    console.log("🔵 onload ejecutado");

    // 🔹 RESPUESTAS
    const respuestasGuardadas = localStorage.getItem("respuestasFormulario");
    console.log("📦 respuestasGuardadas:", respuestasGuardadas);

    if (respuestasGuardadas) {
        try {
            respuestas = JSON.parse(respuestasGuardadas);
        } catch (e) {
            console.log("❌ Error parseando respuestas:", e);
            respuestas = {};
        }
    } else {
        respuestas = {};
    }

    console.log("🧠 respuestas en memoria:", respuestas);

    // 🔹 PASO
    const pasoGuardado = localStorage.getItem("pasoActual");
    console.log("📍 pasoGuardado:", pasoGuardado);

    if (pasoGuardado !== null) {
        pasoActual = parseInt(pasoGuardado);
        pasoMaximoAlcanzado = pasoActual;
    }

    // 🔹 TIPO
    const tipoGuardado = localStorage.getItem("tipoCliente");
    console.log("👤 tipoGuardado:", tipoGuardado);

    if (tipoGuardado) {
        const select = document.getElementById("tipoCliente");
        select.value = tipoGuardado;

        console.log("🚀 Llamando a generarFormulario()");
        generarFormulario();
    } else {
        console.log("⚠️ No hay tipoCliente guardado");
    }
};

</script>
